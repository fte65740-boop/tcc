<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room2WORK</title>

    <link rel="stylesheet" href="C:/Users/FRANCISCOTEREZANESTE/Desktop/sitetcc/CSS/login.css">

    <!-- IMPORTAÇÃO DOS ÍCONES -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <header>
    <main class="container">
        <form>
            <h1>Login Room2WORK</h1>
            <div class="input-box">
                <input placeholder="Email:" type="email">
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input placeholder="Senha:" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembrar minha senha
                </label>
                <a href="#">Esqueci minha senha</a>
            </div>

            <button type="submit" class="login">Login</button>
            
            <div class="register-link">
                <p>Não tem conta? <a href="file:///C:/Users/FRANCISCOTEREZANESTE/Desktop/sitetcc/JAVA%20SCRIPT/cadastro.html?dia=&mes=&ano=">Cadastre-se</a></p>
            </div>
        </form>
    </main>
</body>
</html>
